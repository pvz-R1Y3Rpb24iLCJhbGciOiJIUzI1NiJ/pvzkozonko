<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Морской бой · ПВЗ</title>
<link rel="icon" href="favicon.ico">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0F1117;--card:#1A1D27;--card2:#22263A;--border:#2A2E45;--t1:#E8EAED;--t2:#9AA0BB;--t3:#5F6585;--blue:#5B8AF5;--green:#34C759;--red:#FF453A;--yellow:#FFB020;--purple:#A855F7;--water:#1e3a5f;--hit:#dc2626;--miss:#475569;--ship:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.back{background:none;border:none;color:var(--t2);cursor:pointer;font-size:20px;padding:4px 8px;border-radius:6px}
.back:hover{background:var(--card2);color:var(--t1)}
h1{font-size:18px;font-weight:800}
.sub{color:var(--t3);font-size:12px}
.wrap{max-width:900px;margin:0 auto;padding:20px}
.screen{display:none}
.screen.active{display:block}

/* LOBBY */
.session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:16px}
.session-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .15s}
.session-card:hover{border-color:var(--blue);background:var(--card2)}
.session-title{font-weight:700;font-size:14px;margin-bottom:4px}
.session-meta{font-size:11px;color:var(--t3)}
.session-players{display:flex;gap:6px;margin-top:10px}
.player-chip{background:var(--card2);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--blue)}
.player-chip.empty{color:var(--t3);border:1px dashed var(--border);background:none}
.btn{padding:10px 18px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{filter:brightness(1.15)}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--t1)}
.btn-ghost:hover{background:var(--card2)}
.create-form{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.form-group{flex:1;min-width:160px}
label{display:block;font-size:11px;color:var(--t3);margin-bottom:5px;font-weight:600;text-transform:uppercase}
input[type=text],input[type=password],select{width:100%;padding:9px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-size:13px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--blue)}

/* SETUP */
.setup-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:600px){.setup-wrap{grid-template-columns:1fr}}
.setup-board-label{font-size:12px;font-weight:700;color:var(--t3);margin-bottom:8px;text-transform:uppercase}
.ships-palette{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.ship-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--card2);border:1px solid var(--border);cursor:pointer;color:var(--t1);font-size:12px;font-weight:600;transition:all .15s}
.ship-btn:hover:not(:disabled){border-color:var(--blue)}
.ship-btn.selected{border-color:var(--blue);background:rgba(91,138,245,.15)}
.ship-btn:disabled{opacity:.4;cursor:default}
.ship-visual{display:flex;gap:2px}
.ship-cell{width:14px;height:14px;background:var(--ship);border-radius:2px}
.rotate-btn{padding:6px 12px;border-radius:8px;background:var(--card2);border:1px solid var(--border);color:var(--t1);cursor:pointer;font-size:11px;font-weight:600}

/* GRID */
.grid-container{display:inline-block;user-select:none}
.grid{display:grid;grid-template-columns:repeat(11,32px);grid-template-rows:repeat(11,32px)}
.grid-cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t3);border:1px solid transparent;cursor:default;transition:background .1s,border-color .1s}
.grid-cell.header{color:var(--t2);background:none}
.grid-cell.sea{background:var(--water);border-color:rgba(255,255,255,.06);cursor:pointer}
.grid-cell.sea:hover{background:#2a4f7f;border-color:rgba(255,255,255,.15)}
.grid-cell.ship-placed{background:var(--ship);border-color:#60a5fa}
.grid-cell.preview{background:rgba(91,138,245,.4);border-color:rgba(91,138,245,.6)}
.grid-cell.preview-bad{background:rgba(255,69,58,.3);border-color:rgba(255,69,58,.5)}
.grid-cell.hit{background:var(--hit);border-color:#ef4444;cursor:default}
.grid-cell.miss{background:var(--miss);border-color:#64748b;cursor:default}
.grid-cell.sunk{background:#7f1d1d;border-color:#dc2626}
.grid-cell.enemy-ship-placed{background:var(--water);border-color:rgba(255,255,255,.06);cursor:pointer}
@media(max-width:500px){.grid{grid-template-columns:repeat(11,28px);grid-template-rows:repeat(11,28px)}.grid-cell{width:28px;height:28px}}

/* GAME */
.game-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.game-layout{grid-template-columns:1fr}}
.board-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:8px}
.status-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;font-weight:600}
.status-bar.your-turn{border-color:var(--green);background:rgba(52,199,89,.08)}
.status-bar.enemy-turn{border-color:var(--yellow);background:rgba(255,176,32,.08)}
.status-bar.won{border-color:var(--green);background:rgba(52,199,89,.15)}
.status-bar.lost{border-color:var(--red);background:rgba(255,69,58,.12)}

/* CHAT */
.chat-section{margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.chat-messages{height:180px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.chat-msg{font-size:12px;line-height:1.4}
.chat-msg .who{font-weight:700;color:var(--blue)}
.chat-msg.system .who{color:var(--t3)}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border)}
.chat-input-row input{flex:1;padding:8px 10px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-size:12px;font-family:inherit}
.chat-send{padding:8px 14px;border-radius:8px;background:var(--blue);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:700}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.tag-green{background:rgba(52,199,89,.15);color:var(--green)}
.tag-red{background:rgba(255,69,58,.12);color:var(--red)}
.tag-blue{background:rgba(91,138,245,.15);color:var(--blue)}
</style>
</head>
<body>
<div class="header">
  <button class="back" onclick="history.back()">←</button>
  <div>
    <h1>🚢 Морской бой</h1>
    <div class="sub">ПВЗ система · Чунга-Чанга</div>
  </div>
</div>

<!-- SCREEN: LOBBY -->
<div class="wrap" id="screenLobby" class="screen active">

  <div class="create-form">
    <div style="font-weight:700;font-size:14px;margin-bottom:14px">➕ Новая игра</div>
    <div class="form-row">
      <div class="form-group">
        <label>Ваше имя</label>
        <input type="text" id="myName" placeholder="Введите имя" maxlength="20">
      </div>
      <div class="form-group">
        <label>Пароль сессии (необязательно)</label>
        <input type="password" id="sessionPwd" placeholder="Без пароля — открытая" maxlength="20">
      </div>
      <button class="btn btn-primary" onclick="createSession()" style="white-space:nowrap">Создать</button>
    </div>
  </div>

  <div style="font-weight:700;font-size:14px;margin-bottom:10px">🎮 Активные сессии</div>
  <div id="sessionList">
    <div style="color:var(--t3);font-size:13px">Загрузка…</div>
  </div>
</div>

<!-- SCREEN: JOIN (password prompt) -->
<div class="wrap" id="screenJoin" style="display:none">
  <div style="max-width:360px;margin:40px auto">
    <div style="font-weight:700;font-size:16px;margin-bottom:16px">🔒 Введите пароль</div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Ваше имя</label>
      <input type="text" id="joinName" placeholder="Введите имя" maxlength="20">
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>Пароль</label>
      <input type="password" id="joinPwd" placeholder="">
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="joinWithPwd()">Войти</button>
      <button class="btn btn-ghost" onclick="showLobby()">Назад</button>
    </div>
    <div id="joinErr" style="color:var(--red);font-size:12px;margin-top:8px"></div>
  </div>
</div>

<!-- SCREEN: SETUP -->
<div class="wrap" id="screenSetup" style="display:none">
  <div style="font-weight:700;font-size:16px;margin-bottom:4px">⚓ Расставьте корабли</div>
  <div style="font-size:12px;color:var(--t3);margin-bottom:16px">Нажмите на корабль, затем кликните на поле чтобы разместить</div>
  <div class="setup-wrap">
    <div>
      <div class="setup-board-label">Ваше поле</div>
      <div class="grid-container"><div class="grid" id="setupGrid"></div></div>
    </div>
    <div>
      <div style="margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase">Корабли</span>
        <button class="rotate-btn" onclick="toggleRotate()">↕ Повернуть</button>
      </div>
      <div class="ships-palette" id="shipsPalette"></div>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="randomPlace()">🎲 Случайно</button>
        <button class="btn btn-ghost" onclick="clearShips()">🗑 Очистить</button>
        <button class="btn btn-primary" id="readyBtn" onclick="setReady()" disabled>✅ Готов!</button>
      </div>
      <div id="waitingMsg" style="display:none;margin-top:14px;font-size:12px;color:var(--t3);padding:10px;background:var(--card);border-radius:8px;border:1px solid var(--border)">
        ⏳ Ждём второго игрока…
      </div>
    </div>
  </div>
</div>

<!-- SCREEN: GAME -->
<div class="wrap" id="screenGame" style="display:none">
  <div class="status-bar" id="statusBar">Загрузка…</div>
  <div class="game-layout">
    <div>
      <div class="board-label">Ваше поле</div>
      <div class="grid-container"><div class="grid" id="myGrid"></div></div>
    </div>
    <div>
      <div class="board-label">Поле противника — нажмите чтобы выстрелить</div>
      <div class="grid-container"><div class="grid" id="enemyGrid"></div></div>
    </div>
  </div>
  <div class="chat-section">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Написать…" maxlength="120" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">→</button>
    </div>
  </div>
</div>

<script>
const fbCfg={apiKey:"AIzaSyDgpd51erVNy_PwSbYTXPISALNMmYtgTN8",authDomain:"kozonko-9bff6.firebaseapp.com",databaseURL:"https://kozonko-9bff6-default-rtdb.europe-west1.firebasedatabase.app"};
firebase.initializeApp(fbCfg);
const db=firebase.database();
const bsRef=db.ref('/battleship');

// ── STATE ──
let myPlayerIdx=null,sessionId=null,sessionPwd=null,pendingSession=null;
let myShips=[],vertical=false,selectedShip=null;
let myName='';

const SHIP_DEFS=[{size:4,label:'Линкор',count:1},{size:3,label:'Крейсер',count:2},{size:2,label:'Эсминец',count:3},{size:1,label:'Катер',count:4}];
let shipsLeft=[];

// ── SCREENS ──
function show(id){['screenLobby','screenJoin','screenSetup','screenGame'].forEach(s=>document.getElementById(s).style.display='none');document.getElementById(id).style.display='block';}
function showLobby(){show('screenLobby');}

// ── LOBBY ──
function loadSessions(){
  bsRef.child('sessions').on('value',snap=>{
    const sessions=snap.val()||{};
    const now=Date.now();
    const el=document.getElementById('sessionList');
    const active=Object.entries(sessions).filter(([id,s])=>s&&(now-s.created_at<6*3600000));
    if(!active.length){el.innerHTML='<div style="color:var(--t3);font-size:13px;padding:20px;text-align:center">Нет активных сессий. Создайте первую!</div>';return;}
    el.innerHTML=`<div class="session-grid">${active.map(([id,s])=>{
      const p1=s.player1?.name||'',p2=s.player2?.name||'';
      const full=p1&&p2;
      const locked=!!s.password;
      return `<div class="session-card" onclick="${full?'':'joinSession(\''+id+'\',\''+locked+'\')'}" style="${full?'opacity:.5;cursor:not-allowed':''}">
        <div class="session-title">${locked?'🔒 ':''} Игра #${id.slice(-4)} ${full?'<span class="tag tag-red">Занято</span>':'<span class="tag tag-green">Ждут</span>'}</div>
        <div class="session-meta">${Math.floor((now-s.created_at)/60000)} мин назад</div>
        <div class="session-players">
          <div class="player-chip">${p1||'Игрок 1'}</div>
          <div class="player-chip ${p2?'':'empty'}">${p2||'Свободно'}</div>
        </div>
      </div>`}).join('')}</div>`;
  });
}

async function createSession(){
  const name=document.getElementById('myName').value.trim();
  if(!name){alert('Введите имя');return;}
  const pwd=document.getElementById('sessionPwd').value.trim();
  myName=name;
  const id=Date.now().toString(36);
  const sData={created_at:Date.now(),player1:{name,ships:null,ready:false},player2:null,turn:0,shots:{},chat:{},status:'waiting'};
  if(pwd)sData.password=btoa(pwd);
  await bsRef.child('sessions/'+id).set(sData);
  sessionId=id;myPlayerIdx=1;
  startSetup();
}

function joinSession(id,locked){
  if(locked==='true'){
    pendingSession=id;
    show('screenJoin');
    document.getElementById('joinName').value=document.getElementById('myName').value||'';
    return;
  }
  myName=document.getElementById('myName').value.trim()||'Игрок 2';
  doJoin(id);
}

async function joinWithPwd(){
  const name=document.getElementById('joinName').value.trim();
  const pwd=document.getElementById('joinPwd').value.trim();
  if(!name){document.getElementById('joinErr').textContent='Введите имя';return;}
  const snap=await bsRef.child('sessions/'+pendingSession+'/password').get();
  if(snap.val()!==btoa(pwd)){document.getElementById('joinErr').textContent='Неверный пароль';return;}
  myName=name;
  doJoin(pendingSession);
}

async function doJoin(id){
  const snap=await bsRef.child('sessions/'+id).get();
  const s=snap.val();
  if(!s){alert('Сессия не найдена');showLobby();return;}
  if(s.player2){alert('Сессия уже занята');showLobby();return;}
  sessionId=id;myPlayerIdx=2;
  await bsRef.child('sessions/'+id+'/player2').set({name:myName,ships:null,ready:false});
  startSetup();
}

// ── SETUP ──
function startSetup(){
  shipsLeft=SHIP_DEFS.flatMap(d=>Array(d.count).fill(null).map(()=>({size:d.size,label:d.label,placed:false})));
  myShips=[];
  show('screenSetup');
  renderShipsPalette();
  renderSetupGrid();
  listenSession();
}

function renderShipsPalette(){
  const el=document.getElementById('shipsPalette');
  el.innerHTML=shipsLeft.map((s,i)=>`
    <button class="ship-btn${s.placed?' selected':''}" id="sbtn-${i}" ${s.placed?'disabled':''} onclick="selectShip(${i})">
      <div class="ship-visual">${Array(s.size).fill('<div class="ship-cell"></div>').join('')}</div>
      <span>${s.label} (${s.size})</span>
    </button>`).join('');
}

function selectShip(i){
  selectedShip=i;
  document.querySelectorAll('.ship-btn').forEach((b,j)=>b.classList.toggle('selected',j===i));
}

function toggleRotate(){vertical=!vertical;}

function renderSetupGrid(previewCells=[],bad=false){
  const el=document.getElementById('setupGrid');
  const placed=new Set(myShips.flatMap(s=>s.cells.map(([r,c])=>r+','+c)));
  const prev=new Set(previewCells.map(([r,c])=>r+','+c));
  el.innerHTML='';
  // header row
  const corner=document.createElement('div');corner.className='grid-cell header';el.appendChild(corner);
  for(let c=1;c<=10;c++){const d=document.createElement('div');d.className='grid-cell header';d.textContent='АБВГДЕЖЗИК'[c-1];el.appendChild(d);}
  for(let r=1;r<=10;r++){
    const rh=document.createElement('div');rh.className='grid-cell header';rh.textContent=r;el.appendChild(rh);
    for(let c=1;c<=10;c++){
      const d=document.createElement('div');
      const k=r+','+c;
      if(placed.has(k)){d.className='grid-cell ship-placed';}
      else if(prev.has(k)){d.className='grid-cell '+(bad?'preview-bad':'preview');}
      else{d.className='grid-cell sea';}
      d.addEventListener('mouseenter',()=>hoverSetup(r,c));
      d.addEventListener('mouseleave',()=>renderSetupGrid());
      d.addEventListener('click',()=>placeShip(r,c));
      el.appendChild(d);
    }
  }
}

function getShipCells(r,c,size,vert){
  const cells=[];
  for(let i=0;i<size;i++){cells.push(vert?[r+i,c]:[r,c+i]);}
  return cells;
}

function isValidPlacement(cells){
  const existing=myShips.flatMap(s=>s.cells);
  return cells.every(([r,c])=>{
    if(r<1||r>10||c<1||c>10)return false;
    return !existing.some(([er,ec])=>Math.abs(er-r)<=1&&Math.abs(ec-c)<=1);
  });
}

function hoverSetup(r,c){
  if(selectedShip===null||shipsLeft[selectedShip]?.placed)return;
  const cells=getShipCells(r,c,shipsLeft[selectedShip].size,vertical);
  renderSetupGrid(cells,!isValidPlacement(cells));
}

function placeShip(r,c){
  if(selectedShip===null||shipsLeft[selectedShip]?.placed)return;
  const ship=shipsLeft[selectedShip];
  const cells=getShipCells(r,c,ship.size,vertical);
  if(!isValidPlacement(cells))return;
  myShips.push({size:ship.size,cells,sunk:false});
  ship.placed=true;selectedShip=null;
  renderShipsPalette();renderSetupGrid();
  checkAllPlaced();
}

function clearShips(){myShips=[];shipsLeft.forEach(s=>s.placed=false);selectedShip=null;renderShipsPalette();renderSetupGrid();document.getElementById('readyBtn').disabled=true;}

function randomPlace(){
  clearShips();
  for(const def of SHIP_DEFS){
    for(let k=0;k<def.count;k++){
      let placed=false,tries=0;
      while(!placed&&tries<200){
        const r=1+Math.floor(Math.random()*10),c=1+Math.floor(Math.random()*10),v=Math.random()<.5;
        const cells=getShipCells(r,c,def.size,v);
        if(isValidPlacement(cells)){myShips.push({size:def.size,cells,sunk:false});placed=true;}
        tries++;
      }
      shipsLeft[shipsLeft.findIndex(s=>s.size===def.size&&!s.placed)].placed=true;
    }
  }
  renderShipsPalette();renderSetupGrid();checkAllPlaced();
}

function checkAllPlaced(){
  const ok=shipsLeft.every(s=>s.placed);
  document.getElementById('readyBtn').disabled=!ok;
}

async function setReady(){
  const shipsData=myShips.map(s=>({size:s.size,cells:s.cells}));
  const pKey='player'+myPlayerIdx;
  await bsRef.child('sessions/'+sessionId+'/'+pKey).update({ships:JSON.stringify(shipsData),ready:true});
  document.getElementById('readyBtn').style.display='none';
  document.getElementById('waitingMsg').style.display='block';
}

// ── SESSION LISTENER ──
let sessionUnsubscribe=null;
function listenSession(){
  if(sessionUnsubscribe)sessionUnsubscribe();
  const ref=bsRef.child('sessions/'+sessionId);
  ref.on('value',snap=>{
    const s=snap.val();if(!s)return;
    const p1=s.player1,p2=s.player2;
    const bothReady=p1?.ready&&p2?.ready;
    const inGame=document.getElementById('screenGame').style.display!=='none';
    const inSetup=document.getElementById('screenSetup').style.display!=='none';
    if(inSetup&&bothReady){startGame(s);}
    if(inGame){updateGame(s);}
    updateChat(s.chat||{});
  });
  sessionUnsubscribe=()=>ref.off();
}

// ── GAME ──
let enemyShips=[];
function startGame(s){
  show('screenGame');
  const opKey=myPlayerIdx===1?'player2':'player1';
  try{enemyShips=JSON.parse(s[opKey]?.ships||'[]');}catch(e){enemyShips=[];}
  renderMyGrid(s.shots||{});
  renderEnemyGrid(s.shots||{});
  updateStatus(s);
}

function updateGame(s){
  renderMyGrid(s.shots||{});
  renderEnemyGrid(s.shots||{});
  updateStatus(s);
  // Check win
  if(s.status==='done'){
    const winner=s.winner===myPlayerIdx?'🎉 Вы выиграли!':'💀 Вы проиграли';
    const sb=document.getElementById('statusBar');
    sb.textContent=winner;sb.className='status-bar '+(s.winner===myPlayerIdx?'won':'lost');
  }
}

function myShipAt(r,c){return myShips.find(s=>s.cells.some(([sr,sc])=>sr===r&&sc===c));}
function enemyShipAt(r,c){return enemyShips.find(s=>s.cells.some(([sr,sc])=>sr===r&&sc===c));}

function renderMyGrid(shots){
  const el=document.getElementById('myGrid');
  const myShots=Object.values(shots).filter(s=>s.by!==myPlayerIdx);
  el.innerHTML='';
  const corner=document.createElement('div');corner.className='grid-cell header';el.appendChild(corner);
  for(let c=1;c<=10;c++){const d=document.createElement('div');d.className='grid-cell header';d.textContent='АБВГДЕЖЗИК'[c-1];el.appendChild(d);}
  for(let r=1;r<=10;r++){
    const rh=document.createElement('div');rh.className='grid-cell header';rh.textContent=r;el.appendChild(rh);
    for(let c=1;c<=10;c++){
      const d=document.createElement('div');
      const shot=myShots.find(s=>s.r===r&&s.c===c);
      const ship=myShipAt(r,c);
      if(shot){
        if(ship){d.className='grid-cell hit';d.textContent='🔥';}
        else{d.className='grid-cell miss';d.textContent='•';}
      }else if(ship){d.className='grid-cell ship-placed';}
      else{d.className='grid-cell sea';}
      el.appendChild(d);
    }
  }
}

function renderEnemyGrid(shots){
  const el=document.getElementById('enemyGrid');
  const myShots=Object.values(shots).filter(s=>s.by===myPlayerIdx);
  el.innerHTML='';
  const corner=document.createElement('div');corner.className='grid-cell header';el.appendChild(corner);
  for(let c=1;c<=10;c++){const d=document.createElement('div');d.className='grid-cell header';d.textContent='АБВГДЕЖЗИК'[c-1];el.appendChild(d);}
  for(let r=1;r<=10;r++){
    const rh=document.createElement('div');rh.className='grid-cell header';rh.textContent=r;el.appendChild(rh);
    for(let c=1;c<=10;c++){
      const d=document.createElement('div');
      const shot=myShots.find(s=>s.r===r&&s.c===c);
      const ship=enemyShipAt(r,c);
      if(shot){
        if(ship){d.className='grid-cell hit';d.textContent='🔥';}
        else{d.className='grid-cell miss';d.textContent='•';}
      }else{
        d.className='grid-cell enemy-ship-placed';
        d.addEventListener('click',()=>shoot(r,c));
      }
      el.appendChild(d);
    }
  }
}

async function shoot(r,c){
  // Check it's my turn
  const snap=await bsRef.child('sessions/'+sessionId).get();
  const s=snap.val();
  if(s.status==='done')return;
  if(s.turn!==myPlayerIdx-1)return;
  // Check not already shot
  const existing=Object.values(s.shots||{}).filter(sh=>sh.by===myPlayerIdx&&sh.r===r&&sh.c===c);
  if(existing.length)return;
  const shotKey=Date.now().toString(36);
  const hit=!!enemyShipAt(r,c);
  await bsRef.child('sessions/'+sessionId+'/shots/'+shotKey).set({r,c,by:myPlayerIdx,hit});
  // Switch turn if miss
  if(!hit){
    await bsRef.child('sessions/'+sessionId+'/turn').set(myPlayerIdx===1?1:0);
  }
  // Check if won
  const allShots=Object.values({...(s.shots||{}),  [shotKey]:{r,c,by:myPlayerIdx,hit}}).filter(sh=>sh.by===myPlayerIdx&&sh.hit);
  const totalEnemy=enemyShips.reduce((a,s)=>a+s.cells.length,0);
  if(allShots.length>=totalEnemy){
    await bsRef.child('sessions/'+sessionId).update({status:'done',winner:myPlayerIdx});
    appendChat({by:'system',text:'🎉 '+myName+' выиграл(а)!'});
  }
  if(hit)appendChat({by:'system',text:'💥 Попадание! '+myName+' ходит ещё'});
}

function updateStatus(s){
  if(s.status==='done')return;
  const myTurn=s.turn===myPlayerIdx-1;
  const sb=document.getElementById('statusBar');
  sb.textContent=myTurn?'🎯 Ваш ход — нажмите на поле противника':'⏳ Ход противника';
  sb.className='status-bar '+(myTurn?'your-turn':'enemy-turn');
}

// ── CHAT ──
let lastChatKeys=new Set();
function updateChat(chat){
  const el=document.getElementById('chatMessages');
  const entries=Object.entries(chat).sort((a,b)=>a[1].ts-b[1].ts);
  let changed=false;
  entries.forEach(([k,m])=>{if(!lastChatKeys.has(k)){lastChatKeys.add(k);changed=true;appendMsg(el,m);}});
  if(changed)el.scrollTop=el.scrollHeight;
}
function appendMsg(el,m){
  const d=document.createElement('div');
  d.className='chat-msg'+(m.by==='system'?' system':'');
  d.innerHTML=`<span class="who">${m.by==='system'?'Система':m.name||'?'}</span>: ${escH(m.text)}`;
  el.appendChild(d);
}
function appendChat(msg){
  const k=Date.now().toString(36);
  bsRef.child('sessions/'+sessionId+'/chat/'+k).set({...msg,ts:Date.now()});
}
async function sendChat(){
  const inp=document.getElementById('chatInput');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';
  appendChat({name:myName,by:'player'+myPlayerIdx,text:txt,ts:Date.now()});
}
function escH(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// ── INIT ──
loadSessions();
// Auto-delete sessions older than 6 hours every visit
bsRef.child('sessions').get().then(snap=>{
  const s=snap.val()||{};const now=Date.now();
  Object.entries(s).forEach(([id,sess])=>{
    if(now-(sess?.created_at||0)>6*3600000)bsRef.child('sessions/'+id).remove();
  });
});
</script>
