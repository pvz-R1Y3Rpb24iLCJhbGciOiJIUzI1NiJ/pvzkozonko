<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Морской бой · ПВЗ</title>
<link rel="icon" href="favicon.ico">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#F2F5FA;--card:#FFFFFF;--card2:#EDF1F7;--border:#D9E0EC;--t1:#1A2238;--t2:#5A6478;--t3:#8A92A6;--blue:#2563EB;--blue-soft:#DBEAFE;--green:#16A34A;--red:#DC2626;--yellow:#D97706;--water:#BBD6F2;--water-h:#9EC4ED;--hit:#DC2626;--miss:#94A3B8;--ship:#2563EB}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.header{padding:16px 22px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.back{background:none;border:none;color:var(--t2);cursor:pointer;font-size:22px;padding:4px 10px;border-radius:8px}
.back:hover{background:var(--card2);color:var(--t1)}
h1{font-size:19px;font-weight:800}
.sub{color:var(--t3);font-size:12px}
.wrap{max-width:1000px;margin:0 auto;padding:24px 20px}
.btn{padding:11px 20px;border-radius:11px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--t1)}
.btn-ghost:hover{background:var(--card2)}

/* LOBBY */
.create-form{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.form-title{font-weight:800;font-size:15px;margin-bottom:16px}
.form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.form-group{flex:1;min-width:170px}
label{display:block;font-size:11px;color:var(--t3);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
input[type=text],input[type=password]{width:100%;padding:11px 14px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-size:14px;font-family:inherit}
input:focus{outline:none;border-color:var(--blue);background:#fff}
.session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:14px}
.session-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.session-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 18px rgba(37,99,235,.12)}
.session-title{font-weight:800;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.session-meta{font-size:11px;color:var(--t3)}
.session-players{display:flex;gap:8px;margin-top:12px}
.player-chip{background:var(--blue-soft);border-radius:9px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:6px}
.player-chip.empty{color:var(--t3);border:1px dashed var(--border);background:none}
.player-av{width:20px;height:20px;border-radius:50%;object-fit:cover;background:var(--blue);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:800}
.tag{display:inline-block;padding:3px 9px;border-radius:7px;font-size:10px;font-weight:800}
.tag-green{background:#DCFCE7;color:var(--green)}
.tag-red{background:#FEE2E2;color:var(--red)}

/* EMPLOYEE PICKER */
.emp-picker{max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin:14px 0}
.emp-opt{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .12s}
.emp-opt:hover{border-color:var(--blue);background:var(--blue-soft)}
.emp-opt.sel{border-color:var(--blue);background:var(--blue-soft)}
.emp-av{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
.emp-name{font-weight:700;font-size:14px}

/* SETUP */
.setup-wrap{display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:start}
@media(max-width:640px){.setup-wrap{grid-template-columns:1fr}}
.board-label{font-size:12px;font-weight:800;color:var(--t3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.ships-palette{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.ship-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;color:var(--t1);font-size:13px;font-weight:700;transition:all .12s}
.ship-btn:hover:not(:disabled){border-color:var(--blue);background:var(--blue-soft)}
.ship-btn.selected{border-color:var(--blue);background:var(--blue-soft);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.ship-btn:disabled{opacity:.35;cursor:default}
.ship-visual{display:flex;gap:3px}
.ship-cell{width:16px;height:16px;background:var(--ship);border-radius:3px}
.rotate-btn{padding:8px 14px;border-radius:9px;background:var(--card);border:1.5px solid var(--border);color:var(--t1);cursor:pointer;font-size:12px;font-weight:700}
.rotate-btn:hover{border-color:var(--blue)}

/* GRID */
.grid-container{display:inline-block;user-select:none;background:var(--card);padding:10px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);border:1px solid var(--border)}
.grid{display:grid;grid-template-columns:repeat(11,40px);grid-template-rows:repeat(11,40px)}
.grid-cell{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--t3);border:1px solid transparent;transition:background .1s,border-color .1s}
.grid-cell.header{color:var(--t2);background:none;font-size:12px}
.grid-cell.sea{background:var(--water);border-color:rgba(255,255,255,.5);cursor:pointer;border-radius:4px}
.grid-cell.sea:hover{background:var(--water-h)}
.grid-cell.ship-placed{background:var(--ship);border-color:#1d4ed8;border-radius:4px}
.grid-cell.preview{background:rgba(37,99,235,.45);border-color:rgba(37,99,235,.7);border-radius:4px}
.grid-cell.preview-bad{background:rgba(220,38,38,.4);border-color:rgba(220,38,38,.6);border-radius:4px}
.grid-cell.hit{background:var(--hit);border-color:#b91c1c;color:#fff;border-radius:4px}
.grid-cell.miss{background:var(--miss);border-color:#64748b;color:#fff;border-radius:4px}
.grid-cell.enemy-sea{background:var(--water);border-color:rgba(255,255,255,.5);cursor:crosshair;border-radius:4px}
.grid-cell.enemy-sea:hover{background:var(--water-h)}
@media(max-width:560px){.grid{grid-template-columns:repeat(11,30px);grid-template-rows:repeat(11,30px)}.grid-cell{width:30px;height:30px;font-size:11px}}

/* GAME */
.game-layout{display:grid;grid-template-columns:1fr 1fr;gap:28px;justify-items:center}
@media(max-width:760px){.game-layout{grid-template-columns:1fr}}
.status-bar{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:20px;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.status-bar.your-turn{border-color:var(--green);background:#F0FDF4;color:var(--green)}
.status-bar.enemy-turn{border-color:var(--yellow);background:#FFFBEB;color:var(--yellow)}
.status-bar.won{border-color:var(--green);background:#DCFCE7;color:var(--green);font-size:18px}
.status-bar.lost{border-color:var(--red);background:#FEE2E2;color:var(--red);font-size:18px}

/* CHAT */
.chat-section{margin-top:24px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.chat-head{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:800;font-size:13px;display:flex;align-items:center;gap:8px}
.chat-messages{height:200px;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.chat-msg{font-size:13px;line-height:1.4}
.chat-msg .who{font-weight:800;color:var(--blue)}
.chat-msg.system{color:var(--t3);font-style:italic}
.chat-input-row{display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--border)}
.chat-input-row input{flex:1;padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-size:13px;font-family:inherit}
.chat-send{padding:10px 18px;border-radius:10px;background:var(--blue);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:800}
.players-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.players-bar .player-chip{font-size:13px;padding:8px 14px}
.screen{display:none}
.screen.active{display:block}
</style>
</head>
<body>
<div class="header">
  <button class="back" onclick="history.back()">←</button>
  <div><h1>🚢 Морской бой</h1><div class="sub">ПВЗ система · Чунга-Чанга</div></div>
</div>

<!-- LOBBY -->
<div class="wrap screen active" id="screenLobby">
  <div class="create-form">
    <div class="form-title">➕ Новая игра</div>
    <div class="form-row">
      <div class="form-group">
        <label>Игрок</label>
        <button class="btn btn-ghost" id="createEmpBtn" onclick="openEmpPicker('create')" style="width:100%;text-align:left">Выбрать сотрудника…</button>
      </div>
      <div class="form-group">
        <label>Пароль (необязательно)</label>
        <input type="password" id="sessionPwd" placeholder="Без пароля — открытая">
      </div>
      <button class="btn btn-primary" onclick="createSession()" style="white-space:nowrap">Создать</button>
    </div>
  </div>
  <div class="form-title">🎮 Активные сессии</div>
  <div id="sessionList"><div style="color:var(--t3);font-size:13px">Загрузка…</div></div>
</div>

<!-- EMPLOYEE PICKER -->
<div class="wrap screen" id="screenEmpPicker">
  <div style="max-width:440px;margin:0 auto">
    <div class="form-title">👤 Кто играет?</div>
    <input type="text" id="empSearch" placeholder="🔍 Поиск сотрудника…" oninput="renderEmpPicker()" style="margin-bottom:4px">
    <div class="emp-picker" id="empPickerList"></div>
    <button class="btn btn-ghost" onclick="backFromPicker()" style="width:100%">Назад</button>
  </div>
</div>

<!-- JOIN PASSWORD -->
<div class="wrap screen" id="screenJoin">
  <div style="max-width:380px;margin:30px auto">
    <div class="form-title">🔒 Пароль сессии</div>
    <div class="form-group" style="margin-bottom:16px">
      <label>Пароль</label>
      <input type="password" id="joinPwd">
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="joinWithPwd()">Войти</button>
      <button class="btn btn-ghost" onclick="showLobby()">Назад</button>
    </div>
    <div id="joinErr" style="color:var(--red);font-size:12px;margin-top:10px"></div>
  </div>
</div>

<!-- SETUP -->
<div class="wrap screen" id="screenSetup">
  <div class="form-title">⚓ Расставьте корабли</div>
  <div style="font-size:13px;color:var(--t3);margin-bottom:18px">Выберите корабль справа, затем кликните на поле. Наведите для предпросмотра.</div>
  <div class="setup-wrap">
    <div>
      <div class="board-label">Ваше поле</div>
      <div class="grid-container"><div class="grid" id="setupGrid"></div></div>
    </div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span class="board-label" style="margin:0">Корабли</span>
        <button class="rotate-btn" onclick="toggleRotate()" id="rotateBtn">↔ Горизонтально</button>
      </div>
      <div class="ships-palette" id="shipsPalette"></div>
      <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="randomPlace()">🎲 Случайно</button>
        <button class="btn btn-ghost" onclick="clearShips()">🗑 Очистить</button>
        <button class="btn btn-primary" id="readyBtn" onclick="setReady()" disabled>✅ Готов</button>
      </div>
      <div id="waitingMsg" style="display:none;margin-top:16px;font-size:13px;color:var(--t3);padding:12px;background:var(--card);border-radius:10px;border:1px solid var(--border)">⏳ Ждём второго игрока…</div>
    </div>
  </div>
</div>

<!-- GAME -->
<div class="wrap screen" id="screenGame">
  <div class="players-bar" id="playersBar"></div>
  <div class="status-bar" id="statusBar">Загрузка…</div>
  <div class="game-layout">
    <div><div class="board-label">Ваше поле</div><div class="grid-container"><div class="grid" id="myGrid"></div></div></div>
    <div><div class="board-label">Поле противника</div><div class="grid-container"><div class="grid" id="enemyGrid"></div></div></div>
  </div>
  <div class="chat-section">
    <div class="chat-head">💬 Чат</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Написать…" maxlength="120" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">→</button>
    </div>
  </div>
</div>

<script>
const fbCfg={apiKey:"AIzaSyDgpd51erVNy_PwSbYTXPISALNMmYtgTN8",authDomain:"kozonko-9bff6.firebaseapp.com",databaseURL:"https://kozonko-9bff6-default-rtdb.europe-west1.firebasedatabase.app"};
firebase.initializeApp(fbCfg);
const db=firebase.database();
const bsRef=db.ref('/battleship');

let myPlayerIdx=null,sessionId=null,pendingSession=null;
let myShips=[],vertical=false,selectedShip=null;
let myName='',myAvatar='',pickerMode='create';
let allEmployees=[],selectedEmp=null;

const SHIP_DEFS=[{size:4,label:'Линкор',count:1},{size:3,label:'Крейсер',count:2},{size:2,label:'Эсминец',count:3},{size:1,label:'Катер',count:4}];
let shipsLeft=[];
const LETTERS='АБВГДЕЖЗИК';

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showLobby(){show('screenLobby');}

// ── EMPLOYEES ──
db.ref('/appData/employees').on('value',snap=>{
  const raw=snap.val();
  allEmployees=(Array.isArray(raw)?raw:Object.values(raw||{})).filter(e=>e&&!e.hidden);
});
function initials(name){return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function empAvatarHtml(emp,cls){
  if(emp&&emp.avatarUrl)return `<img class="${cls}" src="${emp.avatarUrl}" alt="">`;
  const col=emp?.color||'#2563EB';
  return `<div class="${cls}" style="background:${col}">${initials(emp?.fullName||emp?.name)}</div>`;
}

window.openEmpPicker=function(mode){pickerMode=mode;show('screenEmpPicker');document.getElementById('empSearch').value='';renderEmpPicker();};
window.backFromPicker=function(){show(pendingSession?'screenLobby':'screenLobby');};
function renderEmpPicker(){
  const q=(document.getElementById('empSearch').value||'').toLowerCase();
  const el=document.getElementById('empPickerList');
  const list=allEmployees.filter(e=>(e.fullName||e.name||'').toLowerCase().includes(q));
  if(!list.length){el.innerHTML='<div style="color:var(--t3);font-size:13px;text-align:center;padding:20px">Никого не найдено</div>';return;}
  el.innerHTML=list.map((e,i)=>`<div class="emp-opt" onclick='pickEmp(${JSON.stringify({id:e.id,name:e.fullName||e.name||"Сотрудник",avatarUrl:e.avatarUrl||"",color:e.color||"#2563EB"}).replace(/'/g,"&#39;")})'>
    ${empAvatarHtml(e,'emp-av')}
    <div class="emp-name">${e.fullName||e.name||'Сотрудник'}</div>
  </div>`).join('');
}
window.pickEmp=function(emp){
  selectedEmp=emp;myName=emp.name;myAvatar=emp.avatarUrl||'';
  if(pickerMode==='create'){
    document.getElementById('createEmpBtn').textContent='👤 '+emp.name;
    show('screenLobby');
  }else if(pickerMode==='join'){
    doJoin(pendingSession);
  }
};

// ── LOBBY ──
function loadSessions(){
  bsRef.child('sessions').on('value',snap=>{
    const sessions=snap.val()||{};const now=Date.now();
    const el=document.getElementById('sessionList');
    const active=Object.entries(sessions).filter(([id,s])=>s&&(now-s.created_at<6*3600000));
    if(!active.length){el.innerHTML='<div style="color:var(--t3);font-size:13px;padding:24px;text-align:center;background:var(--card);border-radius:14px;border:1px solid var(--border)">Нет активных сессий. Создайте первую! 🚢</div>';return;}
    el.innerHTML=`<div class="session-grid">${active.map(([id,s])=>{
      const p1=s.player1,p2=s.player2;
      const full=p1&&p2;const locked=!!s.password;
      const av=(p,fallback)=>p?(p.avatar?`<img class="player-av" src="${p.avatar}">`:`<div class="player-av">${initials(p.name)}</div>`):'';
      return `<div class="session-card" ${full?'':`onclick="joinSession('${id}',${locked})"`} style="${full?'opacity:.6;cursor:default':''}">
        <div class="session-title">${locked?'🔒':'🌊'} Игра #${id.slice(-4)} ${full?'<span class="tag tag-red">Идёт игра</span>':'<span class="tag tag-green">Ждёт игрока</span>'}</div>
        <div class="session-meta">Создана ${Math.floor((now-s.created_at)/60000)} мин назад</div>
        <div class="session-players">
          <div class="player-chip">${av(p1)}${p1?.name||'Игрок 1'}</div>
          <div class="player-chip ${p2?'':'empty'}">${p2?av(p2)+p2.name:'Свободно'}</div>
        </div>
      </div>`}).join('')}</div>`;
  });
}

window.createSession=async function(){
  if(!selectedEmp){alert('Сначала выберите сотрудника');return;}
  const pwd=document.getElementById('sessionPwd').value.trim();
  const id=Date.now().toString(36);
  const sData={created_at:Date.now(),player1:{name:myName,avatar:myAvatar,ships:null,ready:false},player2:null,turn:0,shots:{},chat:{},status:'waiting'};
  if(pwd)sData.password=btoa(pwd);
  await bsRef.child('sessions/'+id).set(sData);
  sessionId=id;myPlayerIdx=1;startSetup();
};

window.joinSession=function(id,locked){
  pendingSession=id;
  if(!selectedEmp){pickerMode='join';openEmpPicker('join');return;}
  if(locked){show('screenJoin');return;}
  doJoin(id);
};
window.joinWithPwd=async function(){
  const pwd=document.getElementById('joinPwd').value.trim();
  const snap=await bsRef.child('sessions/'+pendingSession+'/password').get();
  if(snap.val()!==btoa(pwd)){document.getElementById('joinErr').textContent='Неверный пароль';return;}
  doJoin(pendingSession);
};
async function doJoin(id){
  const snap=await bsRef.child('sessions/'+id).get();
  const s=snap.val();
  if(!s){alert('Сессия не найдена');showLobby();return;}
  if(s.player2){alert('Сессия занята');showLobby();return;}
  sessionId=id;myPlayerIdx=2;
  await bsRef.child('sessions/'+id+'/player2').set({name:myName,avatar:myAvatar,ships:null,ready:false});
  startSetup();
}

// ── SETUP ──
function startSetup(){
  shipsLeft=SHIP_DEFS.flatMap(d=>Array(d.count).fill(0).map(()=>({size:d.size,label:d.label,placed:false})));
  myShips=[];selectedShip=null;vertical=false;
  show('screenSetup');
  document.getElementById('readyBtn').style.display='';
  document.getElementById('waitingMsg').style.display='none';
  document.getElementById('rotateBtn').textContent='↔ Горизонтально';
  renderShipsPalette();renderSetupGrid();listenSession();
}
function renderShipsPalette(){
  document.getElementById('shipsPalette').innerHTML=shipsLeft.map((s,i)=>`
    <button class="ship-btn${selectedShip===i?' selected':''}" ${s.placed?'disabled':''} onclick="selectShip(${i})">
      <div class="ship-visual">${Array(s.size).fill('<div class="ship-cell"></div>').join('')}</div>
      <span>${s.label} (${s.size})</span>
    </button>`).join('');
}
window.selectShip=function(i){selectedShip=i;renderShipsPalette();};
window.toggleRotate=function(){vertical=!vertical;document.getElementById('rotateBtn').textContent=vertical?'↕ Вертикально':'↔ Горизонтально';};

function buildGridDOM(elId,withCoords){
  const el=document.getElementById(elId);el.innerHTML='';
  const corner=document.createElement('div');corner.className='grid-cell header';el.appendChild(corner);
  for(let c=1;c<=10;c++){const d=document.createElement('div');d.className='grid-cell header';d.textContent=LETTERS[c-1];el.appendChild(d);}
  for(let r=1;r<=10;r++){
    const rh=document.createElement('div');rh.className='grid-cell header';rh.textContent=r;el.appendChild(rh);
    for(let c=1;c<=10;c++){
      const d=document.createElement('div');d.dataset.r=r;d.dataset.c=c;d.className='grid-cell sea';el.appendChild(d);
    }
  }
}

function renderSetupGrid(){
  buildGridDOM('setupGrid');
  const el=document.getElementById('setupGrid');
  const placed=new Set(myShips.flatMap(s=>s.cells.map(([r,c])=>r+','+c)));
  el.querySelectorAll('.grid-cell.sea').forEach(d=>{
    const r=+d.dataset.r,c=+d.dataset.c;
    if(placed.has(r+','+c)){d.className='grid-cell ship-placed';}
  });
  // Event delegation (set once)
  if(!el._wired){
    el._wired=true;
    el.addEventListener('mouseover',e=>{
      const cell=e.target.closest('.grid-cell');if(!cell||!cell.dataset.r)return;
      hoverSetup(+cell.dataset.r,+cell.dataset.c);
    });
    el.addEventListener('mouseout',e=>{clearPreview();});
    el.addEventListener('click',e=>{
      const cell=e.target.closest('.grid-cell');if(!cell||!cell.dataset.r)return;
      placeShip(+cell.dataset.r,+cell.dataset.c);
    });
  }
}
function getShipCells(r,c,size,vert){const cells=[];for(let i=0;i<size;i++)cells.push(vert?[r+i,c]:[r,c+i]);return cells;}
function isValid(cells){
  const existing=myShips.flatMap(s=>s.cells);
  return cells.every(([r,c])=>{
    if(r<1||r>10||c<1||c>10)return false;
    return !existing.some(([er,ec])=>Math.abs(er-r)<=1&&Math.abs(ec-c)<=1);
  });
}
function clearPreview(){
  document.querySelectorAll('#setupGrid .preview,#setupGrid .preview-bad').forEach(d=>{
    const r=+d.dataset.r,c=+d.dataset.c;
    const placed=myShips.some(s=>s.cells.some(([sr,sc])=>sr===r&&sc===c));
    d.className='grid-cell '+(placed?'ship-placed':'sea');
  });
}
function hoverSetup(r,c){
  if(selectedShip===null||shipsLeft[selectedShip]?.placed)return;
  clearPreview();
  const cells=getShipCells(r,c,shipsLeft[selectedShip].size,vertical);
  const bad=!isValid(cells);
  cells.forEach(([cr,cc])=>{
    if(cr<1||cr>10||cc<1||cc>10)return;
    const d=document.querySelector(`#setupGrid .grid-cell[data-r="${cr}"][data-c="${cc}"]`);
    if(d&&!d.classList.contains('ship-placed'))d.className='grid-cell '+(bad?'preview-bad':'preview');
  });
}
window.placeShip=function(r,c){
  if(selectedShip===null||shipsLeft[selectedShip]?.placed)return;
  const ship=shipsLeft[selectedShip];
  const cells=getShipCells(r,c,ship.size,vertical);
  if(!isValid(cells))return;
  myShips.push({size:ship.size,cells});
  ship.placed=true;selectedShip=null;
  renderShipsPalette();renderSetupGrid();checkAllPlaced();
};
window.clearShips=function(){myShips=[];shipsLeft.forEach(s=>s.placed=false);selectedShip=null;renderShipsPalette();renderSetupGrid();document.getElementById('readyBtn').disabled=true;};
window.randomPlace=function(){
  clearShips();
  for(const def of SHIP_DEFS){
    for(let k=0;k<def.count;k++){
      let placed=false,tries=0;
      while(!placed&&tries<300){
        const r=1+Math.floor(Math.random()*10),c=1+Math.floor(Math.random()*10),v=Math.random()<.5;
        const cells=getShipCells(r,c,def.size,v);
        if(isValid(cells)){myShips.push({size:def.size,cells});placed=true;}
        tries++;
      }
      const idx=shipsLeft.findIndex(s=>s.size===def.size&&!s.placed);
      if(idx>=0)shipsLeft[idx].placed=true;
    }
  }
  renderShipsPalette();renderSetupGrid();checkAllPlaced();
};
function checkAllPlaced(){document.getElementById('readyBtn').disabled=!shipsLeft.every(s=>s.placed);}
window.setReady=async function(){
  const shipsData=myShips.map(s=>({size:s.size,cells:s.cells}));
  await bsRef.child('sessions/'+sessionId+'/player'+myPlayerIdx).update({ships:JSON.stringify(shipsData),ready:true});
  document.getElementById('readyBtn').style.display='none';
  document.getElementById('waitingMsg').style.display='block';
};

// ── SESSION LISTENER ──
let sessionRef=null;
function listenSession(){
  if(sessionRef)sessionRef.off();
  sessionRef=bsRef.child('sessions/'+sessionId);
  sessionRef.on('value',snap=>{
    const s=snap.val();if(!s)return;
    const bothReady=s.player1?.ready&&s.player2?.ready;
    const inSetup=document.getElementById('screenSetup').classList.contains('active');
    const inGame=document.getElementById('screenGame').classList.contains('active');
    if(inSetup&&bothReady)startGame(s);
    if(inGame)updateGame(s);
    updateChat(s.chat||{});
  });
}

// ── GAME ──
let enemyShips=[];
function startGame(s){
  show('screenGame');
  const opKey=myPlayerIdx===1?'player2':'player1';
  try{enemyShips=JSON.parse(s[opKey]?.ships||'[]');}catch(e){enemyShips=[];}
  renderPlayersBar(s);
  buildGridDOM('myGrid');buildGridDOM('enemyGrid');
  renderBoards(s);updateStatus(s);
  // wire enemy grid click once
  const eg=document.getElementById('enemyGrid');
  if(!eg._wired){eg._wired=true;eg.addEventListener('click',e=>{const cell=e.target.closest('.grid-cell');if(cell&&cell.dataset.r&&cell.classList.contains('enemy-sea'))shoot(+cell.dataset.r,+cell.dataset.c);});}
}
function renderPlayersBar(s){
  const av=(p)=>p?(p.avatar?`<img class="player-av" src="${p.avatar}">`:`<div class="player-av">${initials(p.name)}</div>`):'';
  document.getElementById('playersBar').innerHTML=
    `<div class="player-chip">${av(s.player1)}${s.player1?.name||'Игрок 1'}${myPlayerIdx===1?' (вы)':''}</div>`+
    `<div class="player-chip">${av(s.player2)}${s.player2?.name||'Игрок 2'}${myPlayerIdx===2?' (вы)':''}</div>`;
}
function myShipAt(r,c){return myShips.find(s=>s.cells.some(([sr,sc])=>sr===r&&sc===c));}
function enemyShipAt(r,c){return enemyShips.find(s=>s.cells.some(([sr,sc])=>sr===r&&sc===c));}

function renderBoards(s){
  const shots=s.shots||{};
  // My grid: enemy shots on me
  const enemyShots=Object.values(shots).filter(sh=>sh.by!==myPlayerIdx);
  document.querySelectorAll('#myGrid .grid-cell').forEach(d=>{
    if(!d.dataset.r)return;
    const r=+d.dataset.r,c=+d.dataset.c;
    const shot=enemyShots.find(sh=>sh.r===r&&sh.c===c);const ship=myShipAt(r,c);
    if(shot){d.className='grid-cell '+(ship?'hit':'miss');d.textContent=ship?'✕':'•';}
    else if(ship){d.className='grid-cell ship-placed';d.textContent='';}
    else{d.className='grid-cell sea';d.textContent='';}
  });
  // Enemy grid: my shots
  const myShots=Object.values(shots).filter(sh=>sh.by===myPlayerIdx);
  document.querySelectorAll('#enemyGrid .grid-cell').forEach(d=>{
    if(!d.dataset.r)return;
    const r=+d.dataset.r,c=+d.dataset.c;
    const shot=myShots.find(sh=>sh.r===r&&sh.c===c);const ship=enemyShipAt(r,c);
    if(shot){d.className='grid-cell '+(shot.hit?'hit':'miss');d.textContent=shot.hit?'✕':'•';}
    else{d.className='grid-cell enemy-sea';d.textContent='';}
  });
}
function updateGame(s){
  renderPlayersBar(s);renderBoards(s);
  if(s.status==='done'){
    const won=s.winner===myPlayerIdx;
    const sb=document.getElementById('statusBar');
    sb.textContent=won?'🎉 Вы выиграли!':'💀 Вы проиграли';
    sb.className='status-bar '+(won?'won':'lost');
  }else updateStatus(s);
}
function updateStatus(s){
  if(s.status==='done')return;
  const myTurn=s.turn===myPlayerIdx-1;
  const sb=document.getElementById('statusBar');
  sb.textContent=myTurn?'🎯 Ваш ход — стреляйте по полю противника':'⏳ Ход противника…';
  sb.className='status-bar '+(myTurn?'your-turn':'enemy-turn');
}
async function shoot(r,c){
  const snap=await bsRef.child('sessions/'+sessionId).get();
  const s=snap.val();if(!s||s.status==='done')return;
  if(s.turn!==myPlayerIdx-1)return;
  const already=Object.values(s.shots||{}).some(sh=>sh.by===myPlayerIdx&&sh.r===r&&sh.c===c);
  if(already)return;
  const hit=!!enemyShipAt(r,c);
  const key=Date.now().toString(36);
  await bsRef.child('sessions/'+sessionId+'/shots/'+key).set({r,c,by:myPlayerIdx,hit});
  if(!hit)await bsRef.child('sessions/'+sessionId+'/turn').set(myPlayerIdx===1?1:0);
  const allHits=Object.values({...(s.shots||{}),[key]:{by:myPlayerIdx,hit}}).filter(sh=>sh.by===myPlayerIdx&&sh.hit).length;
  const totalEnemy=enemyShips.reduce((a,s)=>a+s.cells.length,0);
  if(allHits>=totalEnemy&&totalEnemy>0){
    await bsRef.child('sessions/'+sessionId).update({status:'done',winner:myPlayerIdx});
    appendChat({by:'system',text:'🎉 '+myName+' потопил(а) весь флот и победил(а)!'});
  }else if(hit){appendChat({by:'system',text:'💥 '+myName+': попадание ('+LETTERS[c-1]+r+')! Ходит ещё.'});}
}

// ── CHAT ──
let chatKeys=new Set();
function updateChat(chat){
  const el=document.getElementById('chatMessages');const entries=Object.entries(chat).sort((a,b)=>a[1].ts-b[1].ts);
  let changed=false;
  entries.forEach(([k,m])=>{if(!chatKeys.has(k)){chatKeys.add(k);changed=true;const d=document.createElement('div');d.className='chat-msg'+(m.by==='system'?' system':'');d.innerHTML=m.by==='system'?escH(m.text):`<span class="who">${escH(m.name||'?')}</span>: ${escH(m.text)}`;el.appendChild(d);}});
  if(changed)el.scrollTop=el.scrollHeight;
}
function appendChat(msg){bsRef.child('sessions/'+sessionId+'/chat/'+Date.now().toString(36)).set({...msg,ts:Date.now()});}
window.sendChat=function(){const inp=document.getElementById('chatInput');const t=inp.value.trim();if(!t)return;inp.value='';appendChat({name:myName,by:'p'+myPlayerIdx,text:t});};
function escH(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// ── INIT ──
loadSessions();
bsRef.child('sessions').get().then(snap=>{const s=snap.val()||{};const now=Date.now();Object.entries(s).forEach(([id,sess])=>{if(now-(sess?.created_at||0)>6*3600000)bsRef.child('sessions/'+id).remove();});});
</script>
</body>
